{% block contenedor %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cafeteria Express</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg">
                    <div class="card-header bg-success text-white text-center">
                        <h4>INGRESAR AL SISTEMA</h4>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="mb-3">
                                <label for="usuario" class="form-label">USUARIO</label>
                                <input type="text" class="form-control" id="usuario" placeholder="Ingrese su usuario">
                            </div>
                            <div class="mb-3">
                                <label for="contrasenia" class="form-label">CONTRASEÑA</label>
                                <input type="password" class="form-control" id="contrasenia" placeholder="Ingrese su contraseña">
                            </div>
                            <a type="submit" class="btn btn-success w-100" href='/panel_control_empleado/'>INGRESAR</a>
                        </form>
                    </div>
                    <div class="card-footer text-center text-muted">
                        <small>© 2026 Sistema de Cafeteria</small>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
{% endblock contenedor %}

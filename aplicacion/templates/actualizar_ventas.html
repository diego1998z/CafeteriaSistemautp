{% extends "barra_menu.html" %}
{% block contenedor %}
<div class="container my-5">
    <h1 class="text-center text-success">ACTUALIZAR PEDIDO</h1>
    <form action='/logica_actualizar_ventas/' method='POST'>{% csrf_token %}
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="identificacion" class="form-label">IDENTIFICACION</label>
                <input type="text" class="form-control" id="TxtIdentificacion" name="TxtIdentificacion" value="{{ actualizar_ventas.Id_Ventas }}">
            </div>
            <div class="col-md-6 mb-3">
                <label for="nombre" class="form-label">NOMBRE</label>
                <input type="text" class="form-control" id="TxtNombre" name="TxtNombre" value="{{ actualizar_ventas.Nombre_Ventas }}">
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="categoria" class="form-label">MESA</label>
                <input type="text" class="form-control" id="TxtCategoria" name="TxtCategoria" value="{{ actualizar_ventas.Mesa_Ventas }}">
            </div>
            <div class="col-md-6 mb-3">
                <label for="mesa" class="form-label">MONTO PAGO</label>
                <input type="text" class="form-control" id="TxtMesa" name="TxtMesa" value="{{ actualizar_ventas.Monto_Ventas }}">
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="fecha" class="form-label">METODO PAGO</label>
                <input type="text" class="form-control" id="TxtMetodo" name="TxtMetodo" value="{{ actualizar_ventas.Metodo_Ventas }}">
            </div>
            <div class="col-md-6 mb-3">
                <label for="hora" class="form-label">FECHA</label>
                <input type="date" class="form-control" id="TxtFecha" name="TxtFecha" value="{{ actualizar_ventas.Fecha_Ventas }}">
            </div>
            <div class="col-md-6 mb-3">
                <label for="hora" class="form-label">HORA</label>
                <input type="time" class="form-control" id="TxtHora" name="TxtHora" required value="{{ actualizar_ventas.Hora_Ventas }}">
            </div>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-success">ACTUALIZAR PEDIDO</button>
        </div>
    </form>
</div>

{% endblock contenedor %}
